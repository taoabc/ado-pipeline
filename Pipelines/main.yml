# 测试用 Pipeline
# 1. PR 提交时触发
# 2. 两个 stage，验证 exclusive lock 是 stage 级别
# 3. Stage 1 有 lock（30s），Stage 2 无 lock（30s）

trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

lockBehavior: sequential

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Stage1
    displayName: 'Stage 1 - With Lock'
    jobs:
      - deployment: AcquireLock
        displayName: 'Acquire Lock'
        environment: main
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - script: |
                    echo "Lock acquired: $(date)"
                    sleep 10
                    echo "Stage 1 done: $(date)"
                  displayName: 'Work with Lock (10s)'

  - stage: Stage2
    displayName: 'Stage 2 - No Lock'
    dependsOn: Stage1
    jobs:
      - job: PostWork
        displayName: 'Post Work - Wait 30s'
        steps:
          - checkout: none
          - script: |
              echo "Stage 2 started: $(date)"
              sleep 30
              echo "Stage 2 finished: $(date)"
            displayName: 'Post Work (30s)'