# 测试用 Pipeline
# 1. PR 提交时触发
# 2. 等待 2 分钟后结束
# 3. Cancel job 用于取消之前的运行

trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - job: WaitJob
    displayName: 'Wait 10 Seconds'
    steps:
      - checkout: none
      
      - script: |
          echo "Starting wait job..."
          echo "Current time: $(date)"
          echo "Waiting for 10 seconds..."
          sleep 10
          echo "Wait completed!"
          echo "End time: $(date)"
        displayName: 'Wait 30 Seconds'