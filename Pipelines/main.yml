# 测试用 Pipeline
# 1. PR 提交时触发
# 2. 单 stage，验证 exclusive lock 锁整个 pipeline
# 3. Lock + 两个 Job 串行（各 30s）

trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Deploy
    displayName: 'Deploy - With Lock'
    jobs:
      - deployment: AcquireLock
        displayName: 'Acquire Lock'
        environment: main
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - script: |
                    echo "Lock acquired: $(date)"
                    sleep 10
                    echo "Step 1 done: $(date)"
                  displayName: 'Step 1 (10s)'

      - job: PostWork
        displayName: 'Post Work - Wait 30s'
        dependsOn: AcquireLock
        steps:
          - script: |
              echo "Post work started: $(date)"
              sleep 30
              echo "Post work finished: $(date)"
            displayName: 'Step 2 (30s)'
