# Staging Pipeline
# 1. 由 main pipeline 完成后触发
# 2. 使用 staging environment + Exclusive Lock
# 3. 测试：两个 stage，验证 lock 是 stage 级别

trigger: none
pr: none

resources:
  pipelines:
    - pipeline: main-pipeline
      source: taoabc.ado-pipeline
      trigger:
        branches:
          include:
            - '*'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: StagingDeploy
    displayName: 'Stage 1 - Staging Deploy'
    jobs:
      # 获取 Exclusive Lock
      - deployment: AcquireLock
        displayName: 'Acquire Lock'
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - script: echo "Lock acquired"

      # 并行 Job A
      - job: JobA
        displayName: 'Job A - Wait 30s'
        dependsOn: AcquireLock
        steps:
          - checkout: none
          - script: |
              echo "Job A started: $(date)"
              sleep 30
              echo "Job A finished: $(date)"
            displayName: 'Job A'

      # 并行 Job B
      - job: JobB
        displayName: 'Job B - Wait 30s'
        dependsOn: AcquireLock
        steps:
          - checkout: none
          - script: |
              echo "Job B started: $(date)"
              sleep 30
              echo "Job B finished: $(date)"
            displayName: 'Job B'

