# Staging Pipeline
# 1. 由 main pipeline 完成后触发
# 2. 使用 staging environment（支持审批等保护规则）
# 3. 等待 5 分钟后结束

trigger: none
pr: none

resources:
  pipelines:
    - pipeline: main-pipeline
      source: taoabc.ado-pipeline
      trigger:
        branches:
          include:
            - '*'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: StagingDeploy
    displayName: 'Staging Deploy'
    jobs:
      - deployment: WaitJob
        displayName: 'Wait 5 Minutes'
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none

                - script: |
                    echo "Staging pipeline triggered by main pipeline"
                    echo "Current time: $(date)"
                    echo "Waiting for 5 minutes..."
                    sleep 300
                    echo "Wait completed!"
                    echo "End time: $(date)"
                  displayName: 'Wait 5 Minutes'
